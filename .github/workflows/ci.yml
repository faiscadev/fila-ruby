name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      # Build fila-server binary for integration tests.
      - uses: actions/checkout@v4
        with:
          repository: faiscadev/fila
          path: fila
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            fila/target
            ~/.cargo/registry
            ~/.cargo/git
          key: fila-server-${{ runner.os }}-${{ hashFiles('fila/Cargo.lock') }}
          restore-keys: fila-server-${{ runner.os }}-
      - run: cargo build --release -p fila-server --manifest-path fila/Cargo.toml
      - run: bundle exec rake test
        env:
          FILA_SERVER_BIN: ${{ github.workspace }}/fila/target/release/fila-server
